server {
    listen 443 ssl;
    server_name Uniondeprofesionales.com 213.199.57.202;

    # ssl_certificate /etc/letsencrypt/live/Uniondeprofesionales.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/Uniondeprofesionales.com/privkey.pem;
    # include /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    gzip on;
    gzip_types
        text/plain text/css application/json application/javascript
        text/xml application/xml application/xml+rss text/javascript
        font/woff2 application/font-woff2 application/octet-stream;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    location /api/report/ {
        proxy_pass http://mb_laravel_app:8000/api/report/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }
}
server {
    listen 80;
    server_name Uniondeprofesionales.com 213.199.57.202;
    # Redirección HTTP a HTTPS
    if ($scheme = http) {
        return 301 https://$host$request_uri;
    }

    root /usr/share/nginx/html;
    index index.html;

    # SPA: redirigir rutas al index
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache agresiva para estáticos (hash en nombre de archivo)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Gzip
    gzip on;
    gzip_types
        text/plain text/css application/json application/javascript
        text/xml application/xml application/xml+rss text/javascript
        font/woff2 application/font-woff2 application/octet-stream;

    # Cabeceras de seguridad (básicas)
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

#esto l agregue nomas para la reporteria de aca para atras siempre estaba para el fronted 
# ===== Proxy a Laravel (reportería) =====
    location /api/report/ {
        proxy_pass http://mb_laravel_app:8000/api/report/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }
}



